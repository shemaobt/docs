name: Deploy Docs to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '15 * * * *'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-gcp-docs
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  SERVICE_NAME: rfcs-docs
  REPOSITORY: rfcs-docs

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deploy repository
        uses: actions/checkout@v4

      - name: Checkout RFC content from main branch
        uses: actions/checkout@v4
        with:
          repository: shemaobt/rfcs
          ref: main
          path: rfcs-source

      - name: Prepare RFC content for Docker build context
        run: |
          rm -rf rfcs
          cp -R rfcs-source/rfcs ./rfcs

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe "${{ env.REPOSITORY }}" \
            --location "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "${{ env.REPOSITORY }}" \
            --repository-format=docker \
            --location "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}"

      - name: Build and push container image
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          gcloud builds submit . \
            --tag "${IMAGE_URI}" \
            --project "${{ env.PROJECT_ID }}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "${IMAGE_URI}" \
            --region "${{ env.REGION }}" \
            --allow-unauthenticated \
            --project "${{ env.PROJECT_ID }}"
